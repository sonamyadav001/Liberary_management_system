{% extends "base.html" %}
{% block title %}Register - Shabd Sangrah{% endblock %}
{% block content %}

<div
    style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--brown-dark),var(--orange));padding:2rem">
    <div style="width:100%;max-width:500px">
        <div style="text-align:center;margin-bottom:2rem">
            <div style="font-size:60px">📖</div>
            <div style="font-family:'Dancing Script',cursive;font-size:2rem;color:var(--cream);margin-top:0.5rem">Join
                Shabd Sangrah</div>
            <div style="color:rgba(245,245,220,0.7);font-size:0.85rem">Start your reading journey today</div>
        </div>

        <div class="card" style="padding:2.5rem;border-radius:20px">
            <h2
                style="font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--text-dark);margin-bottom:2rem;text-align:center">
                Create Account</h2>
            <form method="POST">
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">👤 Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">📧 Email</label>
                        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">🔒 Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Min 6 chars" required
                            minlength="6">
                    </div>
                    <div class="form-group">
                        <label class="form-label">📞 Phone</label>
                        <input type="tel" name="phone" class="form-control" placeholder="10-digit number">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:1.5rem">
                    <label class="form-label">📍 Address</label>
                    <input type="text" name="address" class="form-control" placeholder="Your address (for delivery)">
                </div>
                <button type="submit" class="btn btn-primary btn-lg"
                    style="width:100%;justify-content:center;font-size:16px">
                    ✨ Create Account
                </button>
            </form>
            <div style="text-align:center;margin-top:1.5rem">
                <p style="color:var(--text-light);font-size:0.9rem">
                    Already registered? <a href="{{ url_for('login') }}"
                        style="color:var(--orange);font-weight:700;text-decoration:none">Sign in →</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
