{% extends "base.html" %}
{% block content %}
<div class="dashboard-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-user">
            <div class="user-avatar" style="width:50px;height:50px;font-size:24px;margin-bottom:8px">👤</div>
            <div class="user-name">{{ session.username }}</div>
            <div class="user-role"
                style="background:var(--orange);color:var(--cream);padding:2px 10px;border-radius:20px;display:inline-block;font-size:11px;font-weight:700;margin-top:4px;text-transform:uppercase">
                User Panel</div>
        </div>
        <ul class="sidebar-nav">
            <li><a href="{{ url_for('user_dashboard') }}"
                    class="{{ 'active' if request.endpoint == 'user_dashboard' else '' }}"><span
                        class="nav-icon">📊</span> Panel Overview</a></li>
            <li><a href="{{ url_for('profile') }}" class="{{ 'active' if request.endpoint == 'profile' else '' }}"><span
                        class="nav-icon">👤</span> Profile & History</a></li>
            <li><a href="{{ url_for('delivery') }}"
                    class="{{ 'active' if request.endpoint == 'delivery' else '' }}"><span class="nav-icon">🚚</span>
                    Track Deliveries</a></li>
            <li><a href="{{ url_for('books') }}"><span class="nav-icon">📚</span> Browse Catalog</a></li>
            <li><a href="{{ url_for('chatbot') }}"><span class="nav-icon">🤖</span> AI Assistant</a></li>
            <li><a href="{{ url_for('logout') }}"><span class="nav-icon">🚪</span> Logout</a></li>
        </ul>
        {% block sidebar_extras %}{% endblock %}
    </aside>

    <!-- MAIN -->
    <div style="flex:1;min-width:0;padding:0 1rem;">
        {% block panel_content %}{% endblock %}
    </div>
</div>
{% endblock %}
